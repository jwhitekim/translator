<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Studio</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Root flex: main | dict-panel ── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left: scrollable translation area ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px 60px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    #main h1 {
      font-size: 15px;
      color: #5f6368;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    #translate-card {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
      display: flex;
      overflow: hidden;
    }

    .card-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .card-pane+.card-pane {
      border-left: 1px solid #e0e0e0;
    }

    .card-label {
      padding: 8px 16px;
      font-size: 12px;
      color: #5f6368;
      border-bottom: 1px solid #e0e0e0;
      letter-spacing: 0.3px;
    }

    #source {
      width: 100%;
      height: 260px;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-size: 16px;
      line-height: 1.7;
      font-family: inherit;
      background: transparent;
      color: #202124;
    }

    #source::placeholder {
      color: #bdc1c6;
    }

    #target {
      padding: 16px;
      font-size: 16px;
      line-height: 1.7;
      color: #5f6368;
      min-height: 260px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #target.has-content {
      color: #202124;
    }

    /* ── Right: dict panel (flex child, width animates) ── */
    #dict-panel {
      width: 0;
      overflow: hidden;
      transition: width 0.3s ease;
      border-left: 1px solid #e0e0e0;
      background: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #dict-inner {
      width: 400px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #dict-panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8f9fa;
      flex-shrink: 0;
    }

    #dict-panel-header>span {
      font-weight: 600;
      font-size: 14px;
      color: #202124;
    }

    #dict-close-btn {
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
      color: #5f6368;
      line-height: 1;
      padding: 2px 4px;
    }

    #dict-close-btn:hover {
      color: #202124;
    }

    #dict-content {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
    }

    .dict-entry {
      padding: 12px 16px;
      border-bottom: 1px solid #f1f3f4;
    }

    .dict-entry-name {
      font-weight: 700;
      font-size: 16px;
      color: #1a73e8;
    }

    .dict-entry-mean {
      font-size: 14px;
      color: #202124;
      line-height: 1.5;
    }

    /* ── Context menu ── */
    #ctx-menu {
      position: fixed;
      display: none;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.18);
      z-index: 9999;
      min-width: 180px;
      overflow: hidden;
    }

    #ctx-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 14px;
      color: #202124;
      cursor: pointer;
      font-family: inherit;
    }

    #ctx-menu button:hover {
      background: #f1f3f4;
    }

    /* ── Spinner ── */
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      color: #d93025;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="app">

    <!-- 번역 영역 -->
    <div id="main">
      <h1>Translation Studio</h1>

      <div id="translate-card">
        <div class="card-pane">
          <div class="card-label">원문 (ENGLISH)</div>
          <textarea id="source" autofocus
            placeholder="텍스트를 입력하면 자동 번역됩니다.&#10;Ctrl+Enter → 즉시 번역  /  텍스트 선택 후 우클릭 → 사전 검색"></textarea>
        </div>

        <div class="card-pane">
          <div class="card-label">번역 결과</div>
          <div id="target"></div>
        </div>
      </div>
    </div>

    <!-- 사전 패널 -->
    <div id="dict-panel">
      <div id="dict-inner">
        <div id="dict-panel-header">
          <span>네이버 사전 — <span id="dict-query-label"></span></span>
          <button id="dict-close-btn">✕</button>
        </div>
        <div id="dict-content"></div>
      </div>
    </div>

  </div>

  <!-- 커스텀 컨텍스트 메뉴 -->
  <div id="ctx-menu">
    <button id="ctx-naver">네이버 사전에서 검색</button>
  </div>

  <script>
    const source = document.getElementById('source');
    const target = document.getElementById('target');
    const dictPanel = document.getElementById('dict-panel');
    const dictLabel = document.getElementById('dict-query-label');
    const dictContent = document.getElementById('dict-content');
    const ctxMenu = document.getElementById('ctx-menu');
    const ctxNaver = document.getElementById('ctx-naver');

    document.getElementById('dict-close-btn').addEventListener('click', closeDict);

    // ── Translate ────────────────────────────────────────────────

    async function translate() {
      const text = source.value.trim();
      if (!text) return;

      target.innerHTML = '<span class="loading-spinner"></span> 번역 중...';
      target.classList.remove('has-content');

      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: [text], target_lang: 'KO' }),
        });
        if (!res.ok) throw new Error(`DeepL 오류 (${res.status})`);
        const data = await res.json();
        target.textContent = data.translations[0].text;
        target.classList.add('has-content');
      } catch (e) {
        target.innerHTML = `<span class="error-msg">${e.message}</span>`;
      }
    }

    // ── Debounce auto-translate ──────────────────────────────────

    let debounceTimer = null;

    source.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (source.value.trim()) translate();
      }, 500);
    });

    source.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        clearTimeout(debounceTimer);
        translate();
      }
    });

    // ── Naver dict ───────────────────────────────────────────────

    function openDict(word) {
      dictLabel.textContent = word;
      dictContent.innerHTML = '<p style="padding:16px;color:#9aa0a6;font-size:14px;"><span class="loading-spinner"></span> 검색 중...</p>';
      dictPanel.style.width = '400px';

      fetch(`/api/naver-dict?query=${encodeURIComponent(word)}`)
        .then(r => r.json())
        .then(data => { dictContent.innerHTML = renderDictResult(data); })
        .catch(() => {
          dictContent.innerHTML = '<p style="padding:16px;color:#d93025;font-size:14px;">오류가 발생했습니다.</p>';
        });
    }

    function closeDict() {
      dictPanel.style.width = '0';
    }

    function renderDictResult(data) {
      if (!data.results || data.results.length === 0) {
        return '<p style="padding:16px;color:#9aa0a6;font-size:14px;">검색 결과 없음</p>';
      }
      return data.results.map(item => `
      <div class="dict-entry">
        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:6px;">
          <span class="dict-entry-name">${item.entry}</span>
          <span style="font-size:13px; color:#9aa0a6;">${item.phonetic}</span>
        </div>
        ${item.senses.map(s => `
          <div style="margin-top:6px;">
            <span style="font-size:11px; color:#03c75a; background:#e8f9f0;
                         padding:1px 6px; border-radius:3px; margin-right:6px;">${s.pos}</span>
            <span class="dict-entry-mean">${s.value}</span>
            ${s.exampleOri ? `
              <div style="margin-top:4px; padding-left:8px; border-left:2px solid #e0e0e0;
                          color:#9aa0a6; font-size:12px; line-height:1.6;">
                <div>${s.exampleOri}</div>
                <div>${s.exampleTrans}</div>
              </div>` : ''}
          </div>`).join('')}
      </div>`).join('');
    }

    // ── Custom context menu ──────────────────────────────────────

    let pendingWord = '';
    let cachedSelection = '';

    document.addEventListener('mouseup', () => {
      if (document.activeElement === source) {
        cachedSelection = source.value.substring(source.selectionStart, source.selectionEnd).trim();
      } else {
        cachedSelection = window.getSelection().toString().trim();
      }
    });

    document.addEventListener('contextmenu', handleCtx, true);

    function handleCtx(e) {
      if (!cachedSelection) return;
      e.preventDefault();
      e.stopPropagation();
      pendingWord = cachedSelection;
      ctxMenu.style.left = `${e.clientX}px`;
      ctxMenu.style.top = `${e.clientY}px`;
      ctxMenu.style.display = 'block';
      const r = ctxMenu.getBoundingClientRect();
      if (r.right > window.innerWidth) ctxMenu.style.left = `${e.clientX - r.width}px`;
      if (r.bottom > window.innerHeight) ctxMenu.style.top = `${e.clientY - r.height}px`;
    }

    function hideCtxMenu() {
      ctxMenu.style.display = 'none';
      pendingWord = '';
    }

    document.addEventListener('click', (e) => {
      if (!ctxMenu.contains(e.target)) hideCtxMenu();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { hideCtxMenu(); closeDict(); }
    });

    ctxNaver.addEventListener('click', () => {
      if (pendingWord) openDict(pendingWord);
      hideCtxMenu();
    });
  </script>
</body>

</html>
