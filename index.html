<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #24292f;
      --text-muted: #6e7781;
      --accent: #0969da;
      --highlight: rgba(9, 105, 218, 0.1);
      --highlight-active: rgba(9, 105, 218, 0.2);
      --radius: 6px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Left: source ── */
    .pane-source {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    /* ── Right: translation + dict ── */
    .pane-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .translation-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .dict-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    .pane-label {
      padding: 5px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #source-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 14px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      font-family: inherit;
    }

    #source-input::placeholder { color: var(--text-muted); }

    #translation-output {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      line-height: 1.9;
      overflow-y: auto;
      color: var(--text-muted);
    }

    #translation-output.has-content { color: var(--text); }

    .word {
      cursor: pointer;
      border-radius: 3px;
      padding: 1px 2px;
      transition: background 0.1s;
    }

    .word:hover { background: var(--highlight); color: var(--accent); }
    .word.active { background: var(--highlight-active); color: var(--accent); font-weight: 600; }

    /* ── Dict panel ── */
    #dict-panel {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    .dict-empty {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .dict-entry { margin-bottom: 14px; }

    .dict-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }

    .dict-word { font-size: 18px; font-weight: 700; color: var(--accent); }
    .dict-pron { font-size: 13px; color: var(--text-muted); }
    .dict-pos  {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
      color: #fff; background: var(--accent);
      border-radius: 3px; padding: 1px 6px;
    }

    .dict-means { list-style: none; counter-reset: item; }
    .dict-means li {
      font-size: 14px; color: var(--text);
      padding: 2px 0 2px 18px;
      position: relative; line-height: 1.6;
    }
    .dict-means li::before {
      content: counter(item) "."; counter-increment: item;
      position: absolute; left: 0;
      color: var(--text-muted); font-size: 11px;
    }

    .dict-naver-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px 10px;
    }
    .dict-naver-link:hover { background: var(--highlight); }

    .loading-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #cf222e; font-size: 13px; }
  </style>
</head>
<body>

<div class="pane-source">
  <div class="pane-label">원문 (English)</div>
  <textarea id="source-input" autofocus
    placeholder="번역할 영어 텍스트를 붙여넣으세요.&#10;&#10;Enter → 번역 / Shift+Enter → 줄바꿈&#10;더블클릭 → 단어 사전 검색"></textarea>
</div>

<div class="pane-right">
  <div class="translation-section">
    <div class="pane-label">번역 결과 (더블클릭 → 사전)</div>
    <div id="translation-output">
      <span style="color:var(--text-muted);font-size:13px;">번역 결과가 여기에 표시됩니다.</span>
    </div>
  </div>
  <div class="dict-section">
    <div class="pane-label">사전</div>
    <div id="dict-panel">
      <p class="dict-empty">단어를 더블클릭하면 뜻이 표시됩니다.</p>
    </div>
  </div>
</div>

<script>
  const sourceInput       = document.getElementById('source-input');
  const translationOutput = document.getElementById('translation-output');
  const dictPanel         = document.getElementById('dict-panel');

  // ── Translate ────────────────────────────────────────────────

  async function translate() {
    const text = sourceInput.value.trim();
    if (!text) return;

    translationOutput.innerHTML = '<span class="loading-spinner"></span> 번역 중...';
    translationOutput.classList.remove('has-content');

    try {
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: [text], target_lang: 'KO' }),
      });
      if (!res.ok) throw new Error(`DeepL 오류 (${res.status})`);
      const data = await res.json();
      renderTranslation(data.translations[0].text);
    } catch (e) {
      translationOutput.innerHTML = `<span class="error-msg">${e.message}</span>`;
    }

    sourceInput.focus();
  }

  function renderTranslation(text) {
    translationOutput.classList.add('has-content');
    const html = text.split(/(\s+)/).map(tok => {
      if (/^\s+$/.test(tok)) return tok.replace(/\n/g, '<br>');
      if (!tok) return '';
      const safe = tok.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      return `<span class="word" data-word="${safe}">${tok}</span>`;
    }).join('');
    translationOutput.innerHTML = html;
  }

  // ── Dict lookup ──────────────────────────────────────────────

  async function lookupWord(raw) {
    const clean = raw.replace(/[^a-zA-Z]/g, '').toLowerCase();
    if (!clean) return;

    document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
    dictPanel.innerHTML = `<p class="dict-empty"><span class="loading-spinner"></span>"${clean}" 검색 중...</p>`;

    try {
      const res = await fetch(`/api/dict?query=${encodeURIComponent(clean)}`);
      if (res.status === 404) {
        dictPanel.innerHTML = `
          <p class="dict-empty">"<strong>${clean}</strong>" 결과 없음</p>
          <a class="dict-naver-link" href="https://dict.naver.com/search.nhn?query=${encodeURIComponent(clean)}" target="_blank" rel="noopener">
            네이버 사전에서 보기 →
          </a>`;
        return;
      }
      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
      const data = await res.json();
      renderDict(data);
    } catch (e) {
      dictPanel.innerHTML = `<p class="error-msg">${e.message}</p>`;
    }

    sourceInput.focus();
  }

  function renderDict(data) {
    let html = '';
    for (const entry of data.entries) {
      html += `<div class="dict-entry">
        <div class="dict-head">
          <span class="dict-word">${entry.word}</span>
          ${entry.pron ? `<span class="dict-pron">${entry.pron}</span>` : ''}
          ${entry.pos  ? `<span class="dict-pos">${entry.pos}</span>`   : ''}
        </div>
        <ul class="dict-means">
          ${entry.means.map(m => `<li>${m}</li>`).join('')}
        </ul>
      </div>`;
    }
    html += `<a class="dict-naver-link"
      href="https://dict.naver.com/search.nhn?query=${encodeURIComponent(data.query)}"
      target="_blank" rel="noopener">네이버 사전에서 더 보기 →</a>`;
    dictPanel.innerHTML = html;
  }

  // ── Double-click triggers ────────────────────────────────────

  translationOutput.addEventListener('mousedown', (e) => { e.preventDefault(); });

  translationOutput.addEventListener('dblclick', (e) => {
    const span = e.target.closest('.word');
    if (!span) return;
    span.classList.add('active');
    lookupWord(span.dataset.word || span.textContent);
  });

  sourceInput.addEventListener('dblclick', () => {
    setTimeout(() => {
      const word = sourceInput.value.slice(sourceInput.selectionStart, sourceInput.selectionEnd).trim();
      if (word) lookupWord(word);
    }, 0);
  });

  // ── Keyboard ─────────────────────────────────────────────────

  sourceInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      translate();
    }
  });
</script>
</body>
</html>
