<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #24292f;
      --text-muted: #6e7781;
      --accent: #0969da;
      --highlight: rgba(9, 105, 218, 0.1);
      --radius: 6px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top: source + translation ── */
    .main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .pane-source {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .pane-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .pane-label {
      padding: 5px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #source-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 14px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      font-family: inherit;
    }

    #source-input::placeholder { color: var(--text-muted); }

    #translation-output {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      line-height: 1.9;
      overflow-y: auto;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    #translation-output.has-content { color: var(--text); }

    /* ── Bottom: Naver dict panel ── */
    .dict-section {
      border-top: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 300px;
      flex-shrink: 0;
    }

    .dict-section.hidden { display: none; }

    #dict-iframe {
      flex: 1;
      border: none;
    }

    #dict-message {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      background: var(--surface);
    }

    #dict-message.visible { display: flex; }

    #dict-message a {
      color: var(--accent);
      font-size: 12px;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 12px;
    }

    #dict-message a:hover { background: var(--highlight); }

    /* ── Custom context menu ── */
    #ctx-menu {
      position: fixed;
      display: none;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
      z-index: 9999;
      min-width: 170px;
      overflow: hidden;
    }

    #ctx-menu button {
      display: block;
      width: 100%;
      padding: 9px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }

    #ctx-menu button:hover { background: var(--highlight); color: var(--accent); }

    .loading-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #cf222e; font-size: 13px; }
  </style>
</head>
<body>

<div class="main-area">
  <div class="pane-source">
    <div class="pane-label">원문 (English)</div>
    <textarea id="source-input" autofocus
      placeholder="번역할 영어 텍스트를 붙여넣으세요.&#10;&#10;Enter → 번역  /  Shift+Enter → 줄바꿈&#10;텍스트 선택 후 우클릭 → 네이버 사전 검색"></textarea>
  </div>

  <div class="pane-right">
    <div class="pane-label">번역 결과</div>
    <div id="translation-output"><span style="color:var(--text-muted);font-size:13px;">번역 결과가 여기에 표시됩니다.</span></div>
  </div>
</div>

<div class="dict-section hidden" id="dict-section">
  <div class="pane-label" id="dict-label">네이버 사전</div>
  <iframe id="dict-iframe"></iframe>
  <div id="dict-message"></div>
</div>

<div id="ctx-menu">
  <button id="ctx-naver">네이버 사전에서 검색</button>
</div>

<script>
  const sourceInput       = document.getElementById('source-input');
  const translationOutput = document.getElementById('translation-output');
  const dictSection       = document.getElementById('dict-section');
  const dictLabel         = document.getElementById('dict-label');
  const dictIframe        = document.getElementById('dict-iframe');
  const dictMessage       = document.getElementById('dict-message');
  const ctxMenu           = document.getElementById('ctx-menu');
  const ctxNaver          = document.getElementById('ctx-naver');

  // ── Translate ────────────────────────────────────────────────

  async function translate() {
    const text = sourceInput.value.trim();
    if (!text) return;

    translationOutput.innerHTML = '<span class="loading-spinner"></span> 번역 중...';
    translationOutput.classList.remove('has-content');

    try {
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: [text], target_lang: 'KO' }),
      });
      if (!res.ok) throw new Error(`DeepL 오류 (${res.status})`);
      const data = await res.json();
      translationOutput.textContent = data.translations[0].text;
      translationOutput.classList.add('has-content');
    } catch (e) {
      translationOutput.innerHTML = `<span class="error-msg">${e.message}</span>`;
    }

    sourceInput.focus();
  }

  // ── Naver dict ───────────────────────────────────────────────

  function searchNaver(query) {
    const q = query.trim();
    if (!q) return;

    const url = `https://dict.naver.com/search.nhn?query=${encodeURIComponent(q)}`;
    dictSection.classList.remove('hidden');
    dictLabel.textContent = `네이버 사전 — "${q}"`;

    // Try iframe; fall back to new tab on X-Frame-Options block
    dictIframe.style.display = 'block';
    dictMessage.className = '';

    let settled = false;

    function fallbackNewTab() {
      if (settled) return;
      settled = true;
      dictIframe.style.display = 'none';
      dictIframe.src = 'about:blank';
      window.open(url, '_blank', 'noopener');
      dictMessage.className = 'visible';
      dictMessage.innerHTML = `
        <span>네이버 사전이 새 탭에서 열렸습니다.</span>
        <a href="${url}" target="_blank" rel="noopener">다시 열기 →</a>`;
    }

    dictIframe.onload = () => {
      if (settled) return;
      try {
        // Cross-origin access throws SecurityError → iframe was blocked
        const body = dictIframe.contentDocument && dictIframe.contentDocument.body;
        if (!body || body.innerHTML.trim() === '') throw new Error('blocked');
        settled = true; // successfully embedded
      } catch {
        fallbackNewTab();
      }
    };

    // Safety timeout in case onload never fires
    setTimeout(fallbackNewTab, 4000);

    dictIframe.src = url;
  }

  // ── Custom context menu ──────────────────────────────────────

  let pendingWord = '';
  let cachedSelection = '';

  document.addEventListener('mouseup', () => {
    const ta = document.querySelector('textarea');
    if (document.activeElement === ta) {
      cachedSelection = ta.value.substring(ta.selectionStart, ta.selectionEnd).trim();
    } else {
      cachedSelection = window.getSelection().toString().trim();
    }
  });

  document.addEventListener('contextmenu', handleCtx, true); // capture: true 필수

  function handleCtx(e) {
    if (!cachedSelection) return;
    e.preventDefault();
    e.stopPropagation();
    showCustomMenu(e.clientX, e.clientY, cachedSelection);
  }

  function showCustomMenu(x, y, word) {
    pendingWord = word;
    ctxMenu.style.left = `${x}px`;
    ctxMenu.style.top  = `${y}px`;
    ctxMenu.style.display = 'block';
    const r = ctxMenu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  ctxMenu.style.left = `${x - r.width}px`;
    if (r.bottom > window.innerHeight) ctxMenu.style.top  = `${y - r.height}px`;
  }

  function hideCtxMenu() {
    ctxMenu.style.display = 'none';
    pendingWord = '';
  }

  document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) hideCtxMenu();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideCtxMenu();
  });

  ctxNaver.addEventListener('click', () => {
    if (pendingWord) searchNaver(pendingWord);
    hideCtxMenu();
  });

  // ── Keyboard ─────────────────────────────────────────────────

  sourceInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      translate();
    }
  });
</script>
</body>
</html>
